<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>{{pageTitle}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{description}}" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    {{{verificationMeta}}}
    <meta property="og:type" content="article" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="{{siteName}}" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:url" content="{{canonicalUrl}}" />
    <meta property="og:image" content="{{ogImage}}" />
    <meta property="article:published_time" content="{{publishDate}}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{description}}" />
    <meta name="twitter:image" content="{{ogImage}}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--surface-2, #faf7f5);
        color: var(--text-on-light, #1a1a1f);
        font-size: 1rem;
        line-height: 1.75;
      }

      .post-main { padding: 2.6rem 0 4.5rem; }
      .post-layout {
        max-width: 860px;
        margin: 0 auto;
      }

      /* Breadcrumb */
      .breadcrumb {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.84rem;
        color: var(--muted-on-light, #6b6864);
        margin-bottom: 1.6rem;
      }
      .breadcrumb a { color: inherit; }
      .breadcrumb a:hover { color: var(--brand, #9c1a36); }
      .breadcrumb .sep { opacity: 0.5; }
      .breadcrumb .current {
        color: var(--text-on-light, #1a1a1f);
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 320px;
      }

      /* Post header */
      .post-head { margin-bottom: 2rem; }
      .post-title {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: clamp(1.55rem, 3.4vw, 2.3rem);
        line-height: 1.35;
        letter-spacing: -0.02em;
        margin: 0.9rem 0 1rem;
      }
      .post-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 1.1rem;
        font-size: 0.86rem;
        color: var(--muted-on-light, #6b6864);
      }
      .post-lead {
        margin-top: 1.6rem;
        font-size: 1.04rem;
        color: #3a3833;
      }
      .post-lead p + p { margin-top: 0.9rem; }

      /* TOC card */
      .post-toc {
        background: var(--surface, #fff);
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.08));
        border-radius: var(--radius-lg, 18px);
        box-shadow: var(--shadow-sm);
        padding: 1.4rem 1.6rem;
        margin: 2rem 0 2.4rem;
      }
      .post-toc-title {
        font-weight: 700;
        font-size: 0.92rem;
        letter-spacing: 0.02em;
        color: var(--brand-deep, #6e0f25);
        margin-bottom: 0.7rem;
      }
      .post-toc ol {
        list-style: none;
        counter-reset: toc;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .post-toc ol li a {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--text-on-light, #1a1a1f);
      }
      .post-toc ol li a:hover { color: var(--brand, #9c1a36); }
      .post-toc ol ol {
        margin: 0.3rem 0 0.45rem 1.1rem;
        gap: 0.22rem;
      }
      .post-toc ol ol li a {
        font-weight: 500;
        font-size: 0.86rem;
        color: var(--muted-on-light, #6b6864);
      }

      /* Article body */
      .post-body {
        background: var(--surface, #fff);
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.08));
        border-radius: var(--radius-lg, 18px);
        box-shadow: var(--shadow-sm);
        padding: clamp(1.5rem, 4vw, 2.8rem);
      }
      .post-body h2 {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: 1.42rem;
        letter-spacing: -0.015em;
        line-height: 1.4;
        margin: 2.4rem 0 1rem;
        padding-top: 1.6rem;
        border-top: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.08));
        scroll-margin-top: 100px;
      }
      .post-body h2:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
      .post-body h3 {
        font-size: 1.08rem;
        font-weight: 700;
        color: var(--brand-deep, #6e0f25);
        margin: 1.8rem 0 0.7rem;
        scroll-margin-top: 100px;
      }
      .post-body p { margin: 0.85rem 0; }
      .post-body ul {
        margin: 0.9rem 0 1.1rem;
        padding-left: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      .post-body li::marker { color: var(--brand, #9c1a36); }
      .post-body a { color: var(--brand, #9c1a36); text-decoration: underline; text-underline-offset: 3px; }
      .post-body strong { font-weight: 700; }

      /* CTA card */
      .post-cta {
        margin-top: 2.4rem;
        background: linear-gradient(135deg, #16070c 0%, #2a0d17 55%, #3a1120 100%);
        border-radius: var(--radius-lg, 18px);
        box-shadow: var(--shadow-lg);
        color: var(--text-on-dark, #f5f1ef);
        padding: clamp(1.6rem, 4vw, 2.6rem);
      }
      .post-cta h2, .post-cta h3 {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: 1.35rem;
        line-height: 1.45;
        margin-bottom: 1rem;
        color: #fff;
      }
      .post-cta p { margin: 0.8rem 0; color: rgba(245, 241, 239, 0.85); }
      .post-cta ul {
        margin: 1rem 0;
        padding-left: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        color: rgba(245, 241, 239, 0.9);
      }
      .post-cta li::marker { color: #c75a78; }
      .post-cta .btn { margin-top: 1.2rem; }

      /* Related posts */
      .related { margin-top: 3rem; }
      .related-title {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: 1.3rem;
        margin-bottom: 1.2rem;
      }
      .related-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
      .related-card {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        background: var(--surface, #fff);
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.08));
        border-radius: var(--radius-md, 14px);
        box-shadow: var(--shadow-sm);
        padding: 1.15rem 1.25rem;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }
      .related-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .related-card .rc-cat {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--brand-deep, #6e0f25);
      }
      .related-card .rc-title {
        font-weight: 600;
        font-size: 0.94rem;
        line-height: 1.5;
      }

      /* Contact modal (works with common.js open/close: .active class) */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 8, 9, 0.55);
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
        z-index: 80;
        align-items: center;
        justify-content: center;
        padding: 1.2rem;
      }
      .modal-overlay.active { display: flex; }
      .modal {
        background: #fff;
        border-radius: var(--radius-lg, 18px);
        box-shadow: var(--shadow-lg);
        width: min(620px, 100%);
        max-height: 90vh;
        overflow-y: auto;
        padding: 1.6rem 1.7rem 1.8rem;
      }
      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.2rem;
      }
      .modal-title { font-weight: 700; font-size: 1.08rem; }
      .modal-close {
        border: 0;
        background: none;
        font-size: 1.05rem;
        cursor: pointer;
        color: var(--muted-on-light, #6b6864);
        padding: 0.3rem;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.9rem 1rem;
      }
      .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
      .form-group.form-full { grid-column: 1 / -1; }
      .form-group label { font-size: 0.82rem; font-weight: 600; }
      .form-group input,
      .form-group select,
      .form-group textarea {
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.12));
        border-radius: 10px;
        padding: 0.65rem 0.8rem;
        font: inherit;
        font-size: 0.9rem;
        background: #fff;
      }
      .form-group textarea { min-height: 96px; resize: vertical; }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.6rem;
        margin-top: 1.3rem;
      }
      .form-note {
        margin-top: 0.9rem;
        font-size: 0.76rem;
        color: var(--muted-on-light, #6b6864);
      }

      @media (max-width: 960px) {
        .related-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .form-grid { grid-template-columns: 1fr; }
        .breadcrumb .current { max-width: 180px; }
      }
    </style>
    <link rel="stylesheet" href="/css/site.css" />
    {{{jsonLd}}}
  </head>
  <body>
    <!-- Floating Social -->
    <div class="floating-social">
      <a href="https://open.kakao.com/o/pw88Wn4h" target="_blank" rel="noopener" class="social-icon" aria-label="카카오톡 오픈채팅">
        <img src="/icons/kakao.png" alt="KakaoTalk" />
      </a>
      <a href="https://cafe.naver.com/onevisionconsulting" target="_blank" rel="noopener" class="social-icon" aria-label="네이버 카페">
        <img src="/icons/naver-cafe.png" alt="Naver Cafe" />
      </a>
      <a href="https://www.instagram.com/onevision_consulting?igsh=NTc4MTowNjQ2YQ==" target="_blank" rel="noopener" class="social-icon" aria-label="인스타그램">
        <img src="/icons/instagram.png" alt="Instagram" />
      </a>
      <a href="https://www.facebook.com/p/OneVision-Consulting-원비전컨설팅-61582774824246/?hr=1" target="_blank" rel="noopener" class="social-icon" aria-label="페이스북">
        <img src="/icons/facebook.png" alt="Facebook" />
      </a>
      <a href="https://blog.naver.com/onevision_consulting" target="_blank" rel="noopener" class="social-icon" aria-label="네이버 블로그">
        <img src="/icons/naver-blog.png" alt="Naver Blog" />
      </a>
    </div>

    <header>{{{headerHtml}}}</header>

    <main class="post-main">
      <div class="container">
        <div class="post-layout">
          <nav class="breadcrumb" aria-label="현재 위치">
            <a href="/index.html">홈</a>
            <span class="sep">›</span>
            <a href="/blog/index.html">{{blogNavLabel}}</a>
            <span class="sep">›</span>
            <a href="/blog/{{category}}/index.html">{{categoryLabel}}</a>
            <span class="sep">›</span>
            <span class="current">{{title}}</span>
          </nav>

          <article>
            <div class="post-head">
              <div class="section-badge"><span class="section-badge-dot"></span>{{categoryLabel}}</div>
              <h1 class="post-title">{{title}}</h1>
              <div class="post-meta">
                <span>게시일 {{publishDateKo}}</span>
                <span>원비전컨설팅 입학 전략 리서치팀</span>
              </div>
              <div class="post-lead">{{{leadHtml}}}</div>
            </div>

            <nav class="post-toc" aria-label="목차">
              <div class="post-toc-title">목차</div>
              {{{tocHtml}}}
            </nav>

            <div class="post-body">{{{bodyHtml}}}</div>

            <aside class="post-cta">
              {{{ctaHtml}}}
              <button class="btn btn-primary" type="button" onclick="openContact()">무료 상담 신청</button>
            </aside>
          </article>

          <section class="related" aria-label="관련 가이드">
            <h2 class="related-title">관련 가이드</h2>
            <div class="related-grid">{{{relatedHtml}}}</div>
          </section>
        </div>
      </div>
    </main>

    <footer>{{{footerHtml}}}</footer>

    <div class="modal-overlay" id="contactModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="무료 상담 신청">
        <div class="modal-head">
          <div class="modal-title">무료 1:1 상담 신청</div>
          <button class="modal-close" type="button" aria-label="닫기" onclick="closeContact()">✕</button>
        </div>
        <div class="modal-body">
          <form method="post" action="#">
            <div class="form-grid">
              <div class="form-group">
                <label for="parentName">학부모 성함</label>
                <input id="parentName" name="parentName" type="text" placeholder="예: 김OO 학부모님" required />
              </div>
              <div class="form-group">
                <label for="studentName">학생 이름</label>
                <input id="studentName" name="studentName" type="text" placeholder="예: 김OO" required />
              </div>
              <div class="form-group">
                <label for="grade">학생 현재 학년</label>
                <select id="grade" name="grade" required>
                  <option value="">선택하세요</option>
                  <option value="middle">중학생</option>
                  <option value="korean-high">한국 고등학생</option>
                  <option value="us-high">미국 High School</option>
                  <option value="cc">Community College 재학</option>
                  <option value="univ">대학교 재학/휴학</option>
                  <option value="etc">기타</option>
                </select>
              </div>
              <div class="form-group">
                <label for="contactInfo">연락처(카카오 ID 또는 이메일)</label>
                <input id="contactInfo" name="contactInfo" type="text" placeholder="예: Kakao ID 또는 email" required />
              </div>
              <div class="form-group form-full">
                <label for="targetArea">희망 지역/대학 (선택)</label>
                <input id="targetArea" name="targetArea" type="text" placeholder="예: 캘리포니아 UC, 동부, 특정 전공 등" />
              </div>
              <div class="form-group form-full">
                <label for="message">상담 요청 내용</label>
                <textarea id="message" name="message" placeholder="현재 고민, 궁금한 점, 일정 등 자유롭게 적어주세요."></textarea>
              </div>
            </div>
            <div class="modal-actions">
              <button class="btn btn-outline" type="button" onclick="closeContact()">닫기</button>
              <button class="btn btn-primary" type="submit">무료 상담 신청 보내기</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/js/common.js"></script>
  </body>
</html>
