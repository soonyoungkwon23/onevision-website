<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>{{pageTitle}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{description}}" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    {{{verificationMeta}}}
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="{{siteName}}" />
    <meta property="og:title" content="{{heading}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:url" content="{{canonicalUrl}}" />
    <meta property="og:image" content="{{ogImage}}" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="alternate" type="application/rss+xml" title="{{siteName}}" href="/rss.xml" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--surface-2, #faf7f5);
        color: var(--text-on-light, #1a1a1f);
        font-size: 1rem;
        line-height: 1.7;
      }

      .blog-hero {
        background: linear-gradient(160deg, #16070c 0%, #2a0d17 60%, #3a1120 100%);
        color: var(--text-on-dark, #f5f1ef);
        padding: 4.2rem 0 3.6rem;
      }
      .blog-hero-title {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        letter-spacing: -0.02em;
        line-height: 1.3;
        margin: 1rem 0 0.9rem;
        color: #fff;
      }
      .blog-hero-sub {
        max-width: 640px;
        color: rgba(245, 241, 239, 0.78);
        font-size: 1.02rem;
      }

      .blog-main { padding: 2.6rem 0 4.5rem; }

      .blog-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.8rem;
      }
      .filter-btn {
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.12));
        background: var(--surface, #fff);
        color: var(--text-on-light, #1a1a1f);
        font: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        padding: 0.5rem 1.1rem;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .filter-btn:hover { border-color: rgba(156, 26, 54, 0.4); color: var(--brand-deep, #6e0f25); }
      .filter-btn.active {
        background: var(--brand, #9c1a36);
        border-color: var(--brand, #9c1a36);
        color: #fff;
      }

      .post-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.1rem;
      }
      .post-card {
        display: flex;
        flex-direction: column;
        background: var(--surface, #fff);
        border: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.08));
        border-radius: var(--radius-lg, 18px);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }
      .post-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
      .post-card.hidden { display: none; }
      .pc-thumb { display: block; line-height: 0; border-bottom: 1px solid var(--border-on-light, rgba(20, 18, 18, 0.06)); }
      .pc-thumb svg { display: block; width: 100%; height: auto; }
      .pc-body {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        padding: 1.25rem 1.4rem 1.4rem;
      }
      .pc-cat {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--brand-deep, #6e0f25);
      }
      .pc-title {
        font-family: "Noto Serif KR", serif;
        font-weight: 600;
        font-size: 1.05rem;
        line-height: 1.5;
        letter-spacing: -0.01em;
      }
      .pc-desc {
        font-size: 0.88rem;
        color: var(--muted-on-light, #6b6864);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .pc-date {
        margin-top: auto;
        font-size: 0.78rem;
        color: var(--muted-on-light, #6b6864);
      }

      .load-more-wrap { text-align: center; margin-top: 2.2rem; }
      .load-more-wrap .btn-outline { min-width: 200px; }
      .empty-note {
        text-align: center;
        color: var(--muted-on-light, #6b6864);
        padding: 3rem 0;
      }

      @media (max-width: 960px) { .post-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 640px) { .post-grid { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/css/site.css" />
    {{{jsonLd}}}
  </head>
  <body>
    <header>{{{headerHtml}}}</header>

    <section class="blog-hero">
      <div class="container">
        <div class="section-badge section-badge--dark"><span class="section-badge-dot"></span>OneVision Guides</div>
        <h1 class="blog-hero-title">{{heading}}</h1>
        <p class="blog-hero-sub">{{subheading}}</p>
      </div>
    </section>

    <main class="blog-main">
      <div class="container">
        {{{filtersHtml}}}
        <div class="post-grid" id="postGrid">
          {{{cardsHtml}}}
        </div>
        <div class="load-more-wrap">
          <button class="btn btn-outline" type="button" id="loadMoreBtn" onclick="loadMore()">더 보기</button>
        </div>
      </div>
    </main>

    <footer>{{{footerHtml}}}</footer>

    <script src="/js/common.js"></script>
    <script>
      var PAGE_SIZE = {{indexPageSize}};
      var shown = 0;
      var activeCat = "all";

      function visibleCards() {
        return Array.prototype.filter.call(
          document.querySelectorAll("#postGrid .post-card"),
          function (c) { return activeCat === "all" || c.getAttribute("data-category") === activeCat; }
        );
      }
      function refresh() {
        var cards = document.querySelectorAll("#postGrid .post-card");
        Array.prototype.forEach.call(cards, function (c) { c.classList.add("hidden"); });
        var vis = visibleCards();
        vis.slice(0, shown).forEach(function (c) { c.classList.remove("hidden"); });
        var btn = document.getElementById("loadMoreBtn");
        if (btn) btn.style.display = vis.length > shown ? "" : "none";
      }
      function loadMore() {
        shown += PAGE_SIZE;
        refresh();
      }
      function setFilter(cat, btn) {
        activeCat = cat;
        shown = PAGE_SIZE;
        Array.prototype.forEach.call(document.querySelectorAll(".filter-btn"), function (b) {
          b.classList.toggle("active", b === btn);
        });
        refresh();
      }
      document.addEventListener("DOMContentLoaded", function () {
        shown = PAGE_SIZE;
        refresh();
      });
    </script>
  </body>
</html>
