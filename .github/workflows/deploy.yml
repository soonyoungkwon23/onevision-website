name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build blog pages, sitemap, RSS
        run: node scripts/build.js

      # Hostinger's FTP cert is *.hstgr.io and the account is reachable only by
      # IP (no PTR record), so strict TLS hostname verification fails. lftp keeps
      # the connection TLS-encrypted (ssl-force) but skips the hostname check.
      # --size-only avoids re-uploading the ~22 MB of unchanged images every run
      # (fresh CI checkout timestamps would otherwise defeat time-based sync).
      - name: Deploy to Hostinger over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set cmd:fail-exit yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 20;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            mirror -R --size-only --parallel=4 --exclude-glob .git* \
              ./public_html /domains/onevisionconsulting.us/public_html;
          "
